    <body class="font-sans text-white antialiased">
    
        <main id="main-container" class="min-h-screen flex items-center justify-center p-6">
            <div id="login-card" class="w-full max-w-[420px] bg-astra-card border border-astra-border rounded-[16px] shadow-2xl p-10 flex flex-col items-center">
                
                <!-- Logo Section -->
                <div id="logo-section" class="flex flex-col items-center mb-8">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 bg-astra-primary rounded-lg flex items-center justify-center shadow-lg shadow-astra-primary/20">
                            <span class="text-white font-bold text-2xl">A</span>
                        </div>
                        <h1 class="text-2xl font-semibold tracking-tight">AstraReach</h1>
                    </div>
                    <p class="text-astra-muted text-[13px] font-medium uppercase tracking-wider">Enterprise Outbound Intelligence</p>
                </div>
    
                <!-- Form Section -->
                <form id="login-form" class="w-full flex flex-col gap-4">
                    <div id="email-field" class="flex flex-col gap-2">
                        <label for="email" class="text-xs font-medium text-astra-muted ml-1">WORK EMAIL</label>
                        <input type="email" id="email" placeholder="name@company.com" class="w-full h-[44px] bg-astra-input border border-astra-border rounded-lg px-4 text-white placeholder-astra-muted focus:outline-none focus:ring-2 focus:ring-astra-primary focus:border-transparent transition-all" required="">
                    </div>
    
                    <div id="password-field" class="flex flex-col gap-2">
                        <label for="password" class="text-xs font-medium text-astra-muted ml-1">PASSWORD</label>
                        <div class="relative">
                            <input type="password" id="password" placeholder="••••••••" class="w-full h-[44px] bg-astra-input border border-astra-border rounded-lg px-4 text-white placeholder-astra-muted focus:outline-none focus:ring-2 focus:ring-astra-primary focus:border-transparent transition-all" required="">
                            <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-astra-muted hover:text-white transition-colors">
                                <i class="text-sm" id="eye-icon" data-fa-i2svg=""><svg class="svg-inline--fa fa-eye" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="eye" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512" data-fa-i2svg=""><path fill="currentColor" d="M288 32c-80.8 0-145.5 36.8-192.6 80.6C48.6 156 17.3 208 2.5 243.7c-3.3 7.9-3.3 16.7 0 24.6C17.3 304 48.6 356 95.4 399.4C142.5 443.2 207.2 480 288 480s145.5-36.8 192.6-80.6c46.8-43.5 78.1-95.4 93-131.1c3.3-7.9 3.3-16.7 0-24.6c-14.9-35.7-46.2-87.7-93-131.1C433.5 68.8 368.8 32 288 32zM144 256a144 144 0 1 1 288 0 144 144 0 1 1 -288 0zm144-64c0 35.3-28.7 64-64 64c-7.1 0-13.9-1.2-20.3-3.3c-5.5-1.8-11.9 1.6-11.7 7.4c.3 6.9 1.3 13.8 3.2 20.7c13.7 51.2 66.4 81.6 117.6 67.9s81.6-66.4 67.9-117.6c-11.1-41.5-47.8-69.4-88.6-71.1c-5.8-.2-9.2 6.1-7.4 11.7c2.1 6.4 3.3 13.2 3.3 20.3z"></path></svg></i>
                            </button>
                        </div>
                    </div>
    
                    <div id="form-options" class="flex items-center justify-between mt-1">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <div class="relative flex items-center">
                                <input type="checkbox" class="peer sr-only">
                                <div class="w-4 h-4 border border-astra-border rounded bg-astra-input peer-checked:bg-astra-primary peer-checked:border-astra-primary transition-all"></div>
                                <i class="absolute text-[10px] text-white opacity-0 peer-checked:opacity-100 left-0.5" data-fa-i2svg=""><svg class="svg-inline--fa fa-check" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="check" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" data-fa-i2svg=""><path fill="currentColor" d="M438.6 105.4c12.5 12.5 12.5 32.8 0 45.3l-256 256c-12.5 12.5-32.8 12.5-45.3 0l-128-128c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0L160 338.7 393.4 105.4c12.5-12.5 32.8-12.5 45.3 0z"></path></svg></i>
                            </div>
                            <span class="text-xs text-astra-muted group-hover:text-gray-300 transition-colors">Remember me</span>
                        </label>
                        <a href="#" class="text-astra-primary text-[12px] font-medium hover:underline">Forgot password?</a>
                    </div>
    
                    <button type="submit" id="submit-btn" class="w-full h-[44px] bg-astra-primary hover:bg-opacity-90 active:scale-[0.98] text-white font-medium rounded-lg mt-4 transition-all shadow-lg shadow-astra-primary/10">
                        Sign in to AstraReach
                    </button>
                </form>
    
                <!-- Footer Info -->
                <div id="card-footer" class="mt-8">
                    <span class="text-astra-muted text-[11px] font-mono">v2.1.0</span>
                </div>
            </div>
        </main>
    
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const passwordInput = document.getElementById('password');
                const toggleBtn = document.getElementById('toggle-password');
                const eyeIcon = document.getElementById('eye-icon');
    
                toggleBtn.addEventListener('click', () => {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    
                    if (type === 'text') {
                        eyeIcon.classList.remove('fa-eye');
                        eyeIcon.classList.add('fa-eye-slash');
                    } else {
                        eyeIcon.classList.remove('fa-eye-slash');
                        eyeIcon.classList.add('fa-eye');
                    }
                });
    
                const form = document.getElementById('login-form');
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const btn = document.getElementById('submit-btn');
                    const originalText = btn.innerText;
                    btn.innerText = 'Authenticating...';
                    btn.disabled = true;
                    btn.style.opacity = '0.7';
                    
                    setTimeout(() => {
                        btn.innerText = originalText;
                        btn.disabled = false;
                        btn.style.opacity = '1';
                    }, 1500);
                });
            });
        </script>
